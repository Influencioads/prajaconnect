services:
  postgres:
    image: postgres:16-alpine
    container_name: praja-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-praja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praja123}
      POSTGRES_DB: ${POSTGRES_DB:-prajaconnect}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praja} -d ${POSTGRES_DB:-prajaconnect}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: praja-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: praja-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-praja}:${POSTGRES_PASSWORD:-praja123}@postgres:5432/${POSTGRES_DB:-prajaconnect}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: ${API_PORT:-4000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-praja-access-secret-dev}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-praja-refresh-secret-dev}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "800"
      TSC_WATCHFILE: DynamicPriorityPolling
      TSC_WATCHDIRECTORY: DynamicPriorityPolling
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./database:/app/database
      - ./packages:/app/packages
      - api_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: praja-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      API_PROXY_TARGET: http://api:4000
      # Next always listens on 3000 inside the container; WEB_PORT only maps the host port.
      WEB_PORT: 3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - web_node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  adminer:
    image: adminer:latest
    container_name: praja-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  pgdata:
  api_node_modules:
  web_node_modules:
  web_next:
